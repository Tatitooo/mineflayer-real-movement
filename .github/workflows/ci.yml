name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [bun, node]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ "${{ matrix.runtime }}" == "bun" ]; then
            bun install
          else
            npm install
          fi

      - name: Type check
        run: |
          if [ "${{ matrix.runtime }}" == "bun" ]; then
            bun run lint
          else
            npx tsc --noEmit
          fi

      - name: Run tests
        run: |
          if [ "${{ matrix.runtime }}" == "bun" ]; then
            bun test
          else
            npm test
          fi
